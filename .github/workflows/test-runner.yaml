name: 'Test Runner'

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: 'Test macOS Setup Scripts'
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make scripts executable
        run: |
          chmod +x src/scripts/*.sh \
            src/scripts/install/*.sh \
            src/scripts/config/*.sh

      - name: Run setup scripts
        run: |
          # --ci skips pre-install.sh (Homebrew bootstrap, Xcode CLT,
          # softwareupdate).
          # GitHub Actions macOS runners already have these installed.
          cd src/scripts
          bash master.sh --ci 2>>"$GITHUB_WORKSPACE/setup_errors.log" || true

      - name: Check error log
        working-directory: ${{ github.workspace }}
        run: |
          # Only show actual errors, not warnings or informational messages
          # Look for lines that indicate real failures:
          # - Lines starting with "Error:" (not "Warning:")
          # - Fatal errors (excluding expected network issues and colima VM
          # errors in CI)
          # - Exit status errors (excluding GitHub Actions messages)
          # - Actual failure messages
          ERROR_LOG="setup_errors.log"
          if [[ -f "$ERROR_LOG" ]] && [[ -s "$ERROR_LOG" ]]; then
            FILTERED_LOG=$(mktemp)
            noise='^[a-zA-Z_][a-zA-Z0-9_]* \(\)|^local |^mkdir -p|^cp |^curl '
            noise+='|^if \[\[|^then|^else|^fi|^return |^export |^==> Fetching'
            noise+='|^🍺.*was successfully installed'
            err_only='^Error:|^\[.*\] \[ERROR\]|fatal error|fatal:.*error|'
            err_only+='exit status [1-9]|exit code [1-9]|'
            err_only+='Failed to|failed to|FAILED'
            ci_safe='fatal: unable to access.*Could not resolve host|'
            ci_safe+='chsh:.*Credentials|chsh:.*PAM|chsh:.*password|'
            ci_safe+='time=.*level=fatal.*colima|'
            ci_safe+='time=.*level=fatal.*error starting vm|'
            ci_safe+='Error: Process completed with exit code'
            grep -v -E "$noise" "$ERROR_LOG" | \
              grep -E "$err_only" | \
              grep -v -E "$ci_safe" | \
              grep -v '^[[:space:]]*$' > "$FILTERED_LOG" || true

            if [[ -s "$FILTERED_LOG" ]]; then
              echo "❌ Errors found:"
              cat "$FILTERED_LOG"
              rm -f "$FILTERED_LOG"
              exit 1
            fi
            rm -f "$FILTERED_LOG"
          fi
